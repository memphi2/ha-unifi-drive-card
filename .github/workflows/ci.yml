name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm clean main baseline
        run: echo "No card implementation is present on this baseline branch."

  ha-compat:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm Home Assistant compatibility baseline
        run: echo "Home Assistant compatibility is validated in the feature PR."

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm browser smoke baseline
        run: echo "Browser smoke is validated in the feature PR."
