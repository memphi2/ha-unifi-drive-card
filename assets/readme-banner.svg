        <circle cx="24" cy="27" r="15" fill="#114c5f"/>
        <text x="50" y="24" font-size="12" fill="#9eacbb">Status</text>
        <text x="50" y="43" font-size="17" font-weight="800" fill="#f7fbff">online</text>
