      <g transform="translate(490 2)">
        <circle cx="28" cy="28" r="22" fill="none" stroke="#3a404a" stroke-width="5"/>
        <path d="M28 6 A22 22 0 0 1 48 36" fill="none" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
        <text x="17" y="64" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="#f7fbff">42%</text>
      </g>
