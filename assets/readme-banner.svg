      <text x="18" y="39" font-size="15" font-weight="800" fill="#f7fbff">OS update</text>
      <rect x="138" y="13" width="126" height="42" rx="8" fill="#252c36" stroke="#394453"/>
      <text x="156" y="39" font-size="15" font-weight="800" fill="#f7fbff">Drive update</text>
      <rect x="282" y="13" width="260" height="42" rx="8" fill="#252c36" stroke="#394453"/>
      <text x="300" y="39" font-size="15" font-weight="800" fill="#f7fbff">Pool 1 <tspan font-size="12" font-weight="500" fill="#9eacbb">healthy</tspan></text>
