        <text x="50" y="24" font-size="12" fill="#9eacbb">Used storage</text>
        <text x="50" y="43" font-size="17" font-weight="800" fill="#f7fbff">420 GiB</text>
      </g>
    </g>

    <g transform="translate(24 176)" font-family="Inter, Segoe UI, Arial, sans-serif">
      <text x="0" y="0" font-size="13" font-weight="800" fill="#9eacbb">STORAGE</text>
      <text x="282" y="0" font-size="13" font-weight="800" fill="#9eacbb">SYSTEM</text>
      <rect x="0" y="13" width="126" height="52" rx="8" fill="#252c36" stroke="#394453"/>
      <circle cx="24" cy="39" r="15" fill="#13445b"/>
      <text x="50" y="45" font-size="16" font-weight="800" fill="#f7fbff">Usage <tspan font-size="12" font-weight="500" fill="#9eacbb">42%</tspan></text>
      <rect x="138" y="13" width="126" height="52" rx="8" fill="#252c36" stroke="#394453"/>
      <circle cx="162" cy="39" r="15" fill="#13445b"/>
      <text x="188" y="45" font-size="16" font-weight="800" fill="#f7fbff">Used <tspan font-size="12" font-weight="500" fill="#9eacbb">420 GiB</tspan></text>
      <rect x="282" y="13" width="260" height="52" rx="8" fill="#252c36" stroke="#394453"/>
      <circle cx="306" cy="39" r="15" fill="#0f4b46"/>
      <text x="332" y="45" font-size="16" font-weight="800" fill="#f7fbff">Fan mode <tspan font-size="12" font-weight="500" fill="#9eacbb">Balance</tspan></text>
    </g>

    <g transform="translate(24 270)" font-family="Inter, Segoe UI, Arial, sans-serif">
      <text x="0" y="0" font-size="13" font-weight="800" fill="#9eacbb">UPDATES</text>
      <text x="282" y="0" font-size="13" font-weight="800" fill="#9eacbb">STORAGE POOLS</text>
