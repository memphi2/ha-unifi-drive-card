<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Drive Storage Card</title>
  <desc id="desc">Dark Home Assistant dashboard banner showing the Drive Storage Card in a wide responsive layout.</desc>
  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#242a33"/>
      <stop offset="1" stop-color="#181c22"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#05080c" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="#161a20"/>
  <path d="M0 341 H1200" stroke="#2f3947" stroke-width="1"/>
  <path d="M0 89 H1200" stroke="#222b35" stroke-width="1"/>
  <path d="M338 0 V420" stroke="#222b35" stroke-width="1"/>
  <path d="M862 0 V420" stroke="#222b35" stroke-width="1"/>

  <g transform="translate(62 64)">
    <rect x="0" y="0" width="62" height="62" rx="16" fill="#0ea5e9"/>
    <path d="M19 20 H43 M19 31 H43 M19 42 H34" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="110" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" fill="#f7fbff">Drive Storage Card</text>
    <text x="0" y="150" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#aeb9c8">Responsive Home Assistant storage card</text>
    <g transform="translate(0 186)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
      <rect x="0" y="0" width="118" height="34" rx="8" fill="#213243" stroke="#34495e"/>
      <text x="18" y="23" fill="#cdeeff">HACS</text>
      <rect x="132" y="0" width="134" height="34" rx="8" fill="#24313c" stroke="#34495e"/>
      <text x="150" y="23" fill="#d9e5f0">Lovelace</text>
      <rect x="282" y="0" width="146" height="34" rx="8" fill="#2c2b3d" stroke="#45425d"/>
      <text x="300" y="23" fill="#e3defe">TypeScript</text>
    </g>
    <text x="0" y="272" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#8d99a8">Blocks reorder automatically as the dashboard width changes.</text>
  </g>

  <g transform="translate(600 42)" filter="url(#shadow)">
